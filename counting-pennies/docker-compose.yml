version: "3.8"

services:
  backend:
    build: ./backend
    container_name: cragdoo-app-counting-pennies-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/data/finance.db
    volumes:
      - ./data:/data
    networks:
      - internal

  frontend:
    build: ./frontend
    container_name: cragdoo-app-counting-pennies-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - internal

networks:
  internal:
    driver: bridge
